                                    // 获取图层中的实际几何要素进行面积计算
                                    let layers = [];

                                    // 如果layer是LayerGroup或FeatureGroup，获取其所有子图层
                                    if (layer instanceof L.LayerGroup || layer instanceof L.FeatureGroup) {
                                        layers = layer.getLayers();
                                    } else {
                                        layers = layer.getLayers ? layer.getLayers() : [layer];
                                    }

                                    console.log('图层数组长度:', layers && Array.isArray(layers) ? layers.length : 0);
                                    if (layers && Array.isArray(layers) && layers.length > 0) {
                                        for (let j = 0; j < layers.length; j++) {
                                            const subLayer = layers[j];
                                            console.log('处理子图层:', subLayer);
                                            let latLngs;

                                            // 根据图层类型获取坐标
                                            if (subLayer instanceof L.Polygon) {
                                                latLngs = subLayer.getLatLngs();
                                                console.log('多边形latLngs:', latLngs);
                                            } else if (subLayer instanceof L.MultiPolygon) {
                                                // 对于MultiPolygon，取第一个多边形
                                                const multiLatLngs = subLayer.getLatLngs();
                                                console.log('MultiPolygon latLngs:', multiLatLngs);
                                                if (multiLatLngs && multiLatLngs.length > 0) {
                                                    latLngs = multiLatLngs[0];
                                                }
                                            } else if (subLayer instanceof L.Rectangle) {
                                                // 对于Rectangle，获取其边界坐标
                                                latLngs = subLayer.getLatLngs();
                                                console.log('矩形latLngs:', latLngs);
                                            }

                                            if (latLngs) {
                                                // 检查L.GeometryUtil是否可用，如果不可用则使用Turf.js
                                                if (typeof L.GeometryUtil !== 'undefined' && typeof L.GeometryUtil.geodesicArea === 'function') {
                                                    const areaSqM = L.GeometryUtil.geodesicArea(latLngs[0] || latLngs);
                                                    const areaMu = (areaSqM / 666.6667).toFixed(4); // 转换为亩
                                                    console.log('使用L.GeometryUtil计算得到的面积:', areaSqM, '平方米 (', areaMu, '亩)');
                                                    console.log('为图层添加面积标签:', areaMu, '亩');
                                                    addAreaLabelToLayer(subLayer, `面积: ${areaMu}亩`); // 使用subLayer而不是layer
                                                    labelCount++;
                                                } else {
                                                    console.log('L.GeometryUtil未定义或geodesicArea方法不存在，尝试使用Turf.js');
                                                    // 使用Turf.js计算面积
                                                    try {
                                                        // 处理多边形坐标，支持外部边界和内部孔洞
                                                        const processPolygon = (polyCoords) => {
                                                            if (!Array.isArray(polyCoords) || polyCoords.length === 0) {
                                                                return null;
                                                            }

                                                            // 如果是多边形数组（外部边界+孔洞），分别处理
                                                            let processedCoords = [];

                                                            // 处理多边形的每个环（第一个是外部边界，其余是孔洞）
                                                            for (let i = 0; i < polyCoords.length; i++) {
                                                                let ring = polyCoords[i];
                                                                if (!Array.isArray(ring)) {
                                                                    ring = [ring]; // 如果不是数组，转换为数组
                                                                }

                                                                // 将Leaflet坐标转换为GeoJSON格式 [lng, lat]
                                                                let geoJsonRing = ring.map(latLng => {
                                                                    if (latLng.lat !== undefined && latLng.lng !== undefined) {
                                                                        return [latLng.lng, latLng.lat];
                                                                    } else if (Array.isArray(latLng) && latLng.length >= 2) {
                                                                        // 如果已经是数组格式 [lat, lng] 或 [lng, lat]
                                                                        return [latLng[1], latLng[0]]; // 假设是 [lat, lng] 格式
                                                                    }
                                                                    return null;
                                                                }).filter(coord => coord !== null);

                                                                // 确保环是闭合的（至少有4个点，首尾相同）
                                                                if (geoJsonRing.length >= 3) {
                                                                    // 如果首尾不相同，闭合环
                                                                    if (geoJsonRing[0][0] !== geoJsonRing[geoJsonRing.length - 1][0] ||
                                                                        geoJsonRing[0][1] !== geoJsonRing[geoJsonRing.length - 1][1]) {
                                                                        geoJsonRing.push(geoJsonRing[0]);
                                                                    }

                                                                    // 确保至少有4个点（闭合后）
                                                                    if (geoJsonRing.length < 4) {
                                                                        // 如果点数不足4个，复制点直到达到4个
                                                                        while (geoJsonRing.length < 4) {
                                                                            geoJsonRing.push(geoJsonRing[geoJsonRing.length - 1]);
                                                                        }
                                                                    }
                                                                } else if (geoJsonRing.length === 2) {
                                                                    // 如果只有2个点，复制它们形成至少4个点的环
                                                                    geoJsonRing.push(geoJsonRing[1]);
                                                                    geoJsonRing.push(geoJsonRing[0]);
                                                                } else if (geoJsonRing.length === 1) {
                                                                    // 如果只有1个点，复制3次形成4个点的环
                                                                    for (let k = 0; k < 3; k++) {
                                                                        geoJsonRing.push(geoJsonRing[0]);
                                                                    }
                                                                }

                                                                processedCoords.push(geoJsonRing);
                                                            }

                                                            return processedCoords;
                                                        };

                                                        // 根据latLngs的结构处理坐标
                                                        let coordinates;
                                                        if (Array.isArray(latLngs) && latLngs.length > 0) {
                                                            if (Array.isArray(latLngs[0])) {
                                                                // 如果是多边形数组（包含外部边界和孔洞）
                                                                coordinates = processPolygon(latLngs);
                                                            } else {
                                                                // 如果是单个多边形边界
                                                                coordinates = processPolygon([latLngs]);
                                                            }
                                                        } else {
                                                            // 单个多边形边界
                                                            coordinates = processPolygon([latLngs]);
                                                        }

                                                        if (coordinates && coordinates.length > 0) {
                                                            const polygon = turf.polygon(coordinates);
                                                            const areaSqM = turf.area(polygon);
                                                            const areaMu = (areaSqM / 666.6667).toFixed(4); // 转换为亩
                                                            console.log('使用Turf.js计算得到的面积:', areaSqM, '平方米 (', areaMu, '亩)');
                                                            console.log('为图层添加面积标签:', areaMu, '亩');
                                                            addAreaLabelToLayer(subLayer, `面积: ${areaMu}亩`); // 使用subLayer而不是layer
                                                            labelCount++;
                                                        } else {
                                                            console.log('无法处理坐标数据，跳过此图层');
                                                        }
                                                    } catch (e) {
                                                        console.error('使用Turf.js计算面积时出错:', e);
                                                    }
                                                }
                                            } else {
                                                console.log('无法获取坐标，跳过此图层');
                                            }
                                        }
                                    } else {
                                        console.log('图层数组为空或不是数组');
                                    }
                                });
                                console.log('总共处理了', labelCount, '个标签');
                            }
                        } else {
                            console.log('轮廓图层组中没有图层');
                        }
                    } else {
                        console.log('轮廓图层组不存在或没有getLayers方法');
                    }
                } else {
                    // 禁用标签：隐藏所有标签
                    console.log('禁用标签显示，清除所有标签');
                    if (labelLayerGroup) {
                        labelLayerGroup.clearLayers();
                        console.log('标签图层已清空，当前图层数量:', labelLayerGroup.getLayers().length);
                    } else {
                        console.log('标签图层组不存在');
                    }
                    container.classList.add('labels-hidden');
                }

                // 确保标签图层始终在最上层
                if (labelLayerGroup) {
                    map.removeLayer(labelLayerGroup);
                    map.addLayer(labelLayerGroup);
                }
            });
        }

        updateStatus('页面加载完成');

        // 添加点击其他地方隐藏右键菜单的事件监听
        document.addEventListener('click', function(e) {
            // 如果点击的不是右键菜单本身，也不是获取地址菜单项，则隐藏菜单
            if (contextMenu && !contextMenu.contains(e.target) && 
                (!getAddressMenuItem || !getAddressMenuItem.contains(e.target))) {
                hideContextMenu();
            }
        });

        // 阻止右键菜单内部的点击事件冒泡
        if (contextMenu) {
            contextMenu.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }
    });

    // 全局函数供HTML调用
    window.drawOutline = drawOutline;
    window.clearOutline = clearOutline;
    window.drawTrack = drawTrack;
    window.startPlayback = startPlayback;
    window.stopPlayback = stopPlayback;

    // 页面加载完成后自动调用轨迹和轮廓绘制功能
    document.addEventListener('DOMContentLoaded', function() {
        // 根据显示模式决定是画线还是打点
        if (trackDisplayMode === 'line') {
            drawTrack();
        } else {
            showTrackPoints();
        }
        setTimeout(() => {
            // 再调用轮廓TAB中的绘制轮廓方法
            drawOutline();
        },1000);
    });
